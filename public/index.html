<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagas encontradas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1 id="page-title">Vagas encontradas</h1>
  <p id="jobs-count">carregando...</p>

  <!-- Caixa de busca: o comportamento dos botões fica em app.js -->
  <div id="search-bar">
    <input id="search-input" type="text" value="python" placeholder="Ex: python, java, dados...">
    <button id="search-button">Buscar vagas</button>
  </div>

  <div id="legend">
    <span class="legend-item"><span class="dot" style="background: var(--color-remote)"></span> Remoto</span>
    <span class="legend-item"><span class="dot" style="background: var(--color-hybrid)"></span> Híbrido</span>
    <span class="legend-item"><span class="dot" style="background: var(--color-onsite)"></span> Presencial</span>
    <span class="legend-item"><span class="dot" style="background: var(--color-other)"></span> Outro</span>
  </div>

  <div id="filters">
    <div class="filter-group" id="source-filters"></div>
    <div class="filter-group">
      <button class="filter-btn active" data-axis="mode" data-value="all">Todos</button>
      <button class="filter-btn"        data-axis="mode" data-value="remote">Remoto</button>
      <button class="filter-btn"        data-axis="mode" data-value="hybrid">Híbrido</button>
      <button class="filter-btn"        data-axis="mode" data-value="on-site">Presencial</button>
      <button class="filter-btn"        data-axis="mode" data-value="other">Outro</button>
    </div>
  </div>

  <div id="pagination-top" class="pagination"></div>
  <div id="jobs-list"></div>
  <div id="pagination" class="pagination"></div>

  <script src="app.js"></script>
</body>
</html>
