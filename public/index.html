<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagas encontradas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1 id="page-title">Vagas encontradas</h1>
  <p id="jobs-count">carregando...</p>

  <!-- Caixa de busca: o botão chama a função searchJobs() -->
  <div id="search-bar">
    <input id="search-input" type="text" value="python" placeholder="Ex: python, java, dados...">
    <button id="search-button" onclick="searchJobs()">Buscar vagas</button>
  </div>

  <div id="legend">
    <span class="legend-item"><span class="dot" style="background: var(--color-remote)"></span> Remoto</span>
    <span class="legend-item"><span class="dot" style="background: var(--color-hybrid)"></span> Híbrido</span>
    <span class="legend-item"><span class="dot" style="background: var(--color-onsite)"></span> Presencial</span>
  </div>

  <div id="jobs-list"></div>

  <script>
    // Traduz o código do modelo de trabalho para texto e classe de cor
    function translateMode(type) {
      if (type === "remote")  return { text: "Remoto",     cssClass: "mode-remote" };
      if (type === "hybrid")  return { text: "Híbrido",    cssClass: "mode-hybrid" };
      if (type === "on-site") return { text: "Presencial", cssClass: "mode-onsite" };
      return { text: "Outro", cssClass: "mode-other" };
    }

    // Transforma a data "2026-06-09T13:48:11Z" em "09/06/2026"
    function formatDate(isoDate) {
      return new Date(isoDate).toLocaleDateString("pt-BR");
    }

    // Monta o HTML de UM card a partir de UMA vaga
    function createCard(job) {
      const mode = translateMode(job.workplaceType);

      const card = document.createElement("div");
      card.className = "job-card " + mode.cssClass;
      card.innerHTML = `
        <div class="card-header">
          <h2 class="job-title">${job.name}</h2>
          <span class="mode-badge">${mode.text}</span>
        </div>
        <p class="company">${job.careerPageName}</p>
        <p class="job-description">${job.description.slice(0, 180)}...</p>
        <div class="card-footer">
          <span class="date">Publicada em ${formatDate(job.publishedDate)}</span>
          <a class="job-link" href="${job.jobUrl}" target="_blank">Ver vaga →</a>
        </div>
      `;
      return card;
    }

    // Desenha na tela a lista de vagas recebida (limpando o que havia antes).
    function renderJobs(jobsList) {
      const container = document.getElementById("jobs-list");
      container.innerHTML = ""; // limpa os cards antigos

      jobsList.forEach(function (job) {
        container.appendChild(createCard(job));
      });
    }

    // Mostra na tela um payload { term, fetchedAt, jobs } vindo do servidor.
    function showJobs(data) {
      const jobs = data.jobs || [];
      const counter = document.getElementById("jobs-count");

      // Se o cache guardou o termo, repõe na caixa de busca.
      if (data.term) {
        document.getElementById("search-input").value = data.term;
      }

      // Estado vazio: nenhuma vaga salva ainda.
      if (jobs.length === 0) {
        counter.textContent = "Nenhuma vaga salva ainda — clique em Buscar";
        document.getElementById("jobs-list").innerHTML = "";
        return;
      }

      let texto = jobs.length + " vagas";
      if (data.fetchedAt) {
        texto += " · atualizado em " + new Date(data.fetchedAt).toLocaleString("pt-BR");
      }
      counter.textContent = texto;
      renderJobs(jobs);
    }

    // Ao abrir a página: lê as vagas já salvas no cache (NÃO rebusca).
    async function loadCache() {
      const response = await fetch("/jobs");
      const data = await response.json();
      showJobs(data);
    }

    // Botão: rebusca na fonte com o termo digitado, salva no cache e mostra.
    async function searchJobs() {
      const term = document.getElementById("search-input").value || "python";
      const button = document.getElementById("search-button");

      button.disabled = true;
      button.textContent = "Buscando...";
      document.getElementById("jobs-count").textContent = "buscando...";

      try {
        const response = await fetch("/search?term=" + encodeURIComponent(term));
        const data = await response.json();
        showJobs(data);
      } catch (error) {
        document.getElementById("jobs-count").textContent = "Erro ao buscar. O servidor está rodando?";
      }

      button.disabled = false;
      button.textContent = "Buscar vagas";
    }

    // Ao abrir a página, carrega o cache (sem rebuscar).
    loadCache();
  </script>
</body>
</html>
