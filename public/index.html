<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagas encontradas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1 id="page-title">Vagas encontradas</h1>
  <p id="jobs-count">carregando...</p>

  <!-- Caixa de busca: o botão chama a função searchJobs() -->
  <div id="search-bar">
    <input id="search-input" type="text" value="python" placeholder="Ex: python, java, dados...">
    <button id="search-button" onclick="searchJobs()">Buscar vagas</button>
  </div>

  <div id="legend">
    <span class="legend-item"><span class="dot" style="background: var(--color-remote)"></span> Remoto</span>
    <span class="legend-item"><span class="dot" style="background: var(--color-hybrid)"></span> Híbrido</span>
    <span class="legend-item"><span class="dot" style="background: var(--color-onsite)"></span> Presencial</span>
  </div>

  <div id="pagination-top" class="pagination"></div>
  <div id="jobs-list"></div>
  <div id="pagination" class="pagination"></div>

  <script>
    // DADOS: estado da exibição (paginação)
    const PAGE_SIZE = 50;   // cards por página
    let viewJobs = [];      // base que será paginada (por ora = todas as vagas)
    let currentPage = 1;    // página atual da exibição

    // Traduz o código do modelo de trabalho para texto e classe de cor
    function translateMode(type) {
      if (type === "remote")  return { text: "Remoto",     cssClass: "mode-remote" };
      if (type === "hybrid")  return { text: "Híbrido",    cssClass: "mode-hybrid" };
      if (type === "on-site") return { text: "Presencial", cssClass: "mode-onsite" };
      return { text: "Outro", cssClass: "mode-other" };
    }

    // Transforma a data "2026-06-09T13:48:11Z" em "09/06/2026"
    function formatDate(isoDate) {
      return new Date(isoDate).toLocaleDateString("pt-BR");
    }

    // Deixa o nome da fonte bonito para o selo: "gupy" -> "Gupy"
    function sourceLabel(source) {
      return source ? source[0].toUpperCase() + source.slice(1) : "";
    }

    // Monta o HTML de UM card a partir de UMA vaga (formato padrão)
    function createCard(job) {
      const mode = translateMode(job.workplaceType);

      const card = document.createElement("div");
      card.className = "job-card " + mode.cssClass;
      card.innerHTML = `
        <div class="card-header">
          <h2 class="job-title">${job.title}</h2>
          <span class="mode-badge">${mode.text}</span>
        </div>
        <p class="company">
          <span class="source-badge source-${job.source}">${sourceLabel(job.source)}</span>
          ${job.company}
        </p>
        <p class="job-location">${job.location || ""}</p>
        <p class="job-description">${job.description ? job.description.slice(0, 180) + "..." : ""}</p>
        <div class="card-footer">
          <span class="date">${job.publishedDate ? "Publicada em " + formatDate(job.publishedDate) : ""}</span>
          <a class="job-link" href="${job.url}" target="_blank">Ver vaga →</a>
        </div>
      `;
      return card;
    }

    // Desenha na tela a lista de vagas recebida (limpando o que havia antes).
    function renderJobs(jobsList) {
      const container = document.getElementById("jobs-list");
      container.innerHTML = ""; // limpa os cards antigos

      jobsList.map(job => {
        container.appendChild(createCard(job));
      });
    }

    // Desenha a página atual: fatia viewJobs, renderiza os cards e a barra de páginas.
    function renderPage() {
      const totalPages = Math.max(1, Math.ceil(viewJobs.length / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;

      const inicio = (currentPage - 1) * PAGE_SIZE;
      renderJobs(viewJobs.slice(inicio, inicio + PAGE_SIZE));
      renderPagination(totalPages);
    }

    // Desenha os botões de paginação nas duas barras (topo e rodapé).
    function renderPagination(totalPages) {
      fillPaginationBar(document.getElementById("pagination-top"), totalPages);
      fillPaginationBar(document.getElementById("pagination"), totalPages);
    }

    // Preenche UMA barra de paginação (some quando há ≤ 1 página).
    function fillPaginationBar(bar, totalPages) {
      bar.innerHTML = "";
      if (totalPages <= 1) return;

      bar.appendChild(makePageButton("‹ Anterior", currentPage - 1, currentPage === 1));
      for (let n = 1; n <= totalPages; n++) {
        const btn = makePageButton(n, n, false);
        if (n === currentPage) btn.classList.add("active");
        bar.appendChild(btn);
      }
      bar.appendChild(makePageButton("Próxima ›", currentPage + 1, currentPage === totalPages));
    }

    // Cria um botão da barra de paginação que leva à página alvo.
    function makePageButton(label, targetPage, disabled) {
      const btn = document.createElement("button");
      btn.className = "page-btn";
      btn.textContent = label;
      btn.disabled = disabled;
      btn.onclick = () => goToPage(targetPage);
      return btn;
    }

    // Vai para a página n, redesenha e rola ao topo da lista.
    function goToPage(n) {
      currentPage = n;
      renderPage();
      document.getElementById("jobs-list").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    // Mostra na tela um payload { term, fetchedAt, jobs } vindo do servidor.
    function showJobs(data) {
      const jobs = data.jobs || [];
      const counter = document.getElementById("jobs-count");

      // Se a base de dados guardou o termo, repõe na caixa de busca.
      if (data.term) {
        document.getElementById("search-input").value = data.term;
      }

      // Estado vazio: nenhuma vaga salva ainda.
      if (jobs.length === 0) {
        counter.textContent = "Nenhuma vaga salva ainda — clique em Buscar";
        document.getElementById("jobs-list").innerHTML = "";
        document.getElementById("pagination-top").innerHTML = "";
        document.getElementById("pagination").innerHTML = "";
        return;
      }

      let texto = jobs.length + " vagas";
      if (data.fetchedAt) {
        texto += " · atualizado em " + new Date(data.fetchedAt).toLocaleString("pt-BR");
      }
      counter.textContent = texto;

      viewJobs = jobs;
      currentPage = 1;
      renderPage();
    }

    // Ao abrir a página: lê as vagas já salvas na base de dados (NÃO rebusca).
    async function loadData() {
      const response = await fetch("/jobs");
      const data = await response.json();
      showJobs(data);
    }

    // Botão: rebusca na fonte com o termo digitado, salva na base de dados e mostra.
    async function searchJobs() {
      const term = document.getElementById("search-input").value || "python";
      const button = document.getElementById("search-button");

      button.disabled = true;
      button.textContent = "Buscando...";
      document.getElementById("jobs-count").textContent = "buscando...";

      try {
        const response = await fetch("/search?term=" + encodeURIComponent(term));
        const data = await response.json();
        showJobs(data);
      } catch (error) {
        document.getElementById("jobs-count").textContent = "Erro ao buscar. O servidor está rodando?";
      }

      button.disabled = false;
      button.textContent = "Buscar vagas";
    }

    // Ao abrir a página, carrega a base de dados (sem rebuscar).
    loadData();
  </script>
</body>
</html>
